<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chinonso Mitchel | JS Developer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --accent: #38bdf8;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
            margin: 0;
            text-align: center;
        }
        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            margin: 0 auto 1.5rem auto; /* Centers horizontally and adds bottom spacing */
            display: block;
            object-fit: cover; /* This is crucial: it crops the image to a circle without stretching it */
            background-color: var(--card); /* Fallback color while image loads */
        }
        h1 { margin: 0; font-size: 1.5rem; }
        p { color: #94a3b8; margin-top: 0.5rem; text-align: center; max-width: 300px; }
        
        .links-container {
            width: 100%;
            max-width: 400px;
            margin-top: 2rem;
        }
        .link-card {
            background: var(--card);
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            transition: transform 0.2s;
            border: 1px solid #334155;
        }
        .link-card:active { transform: scale(0.98); }
        .link-card.primary { background: var(--accent); color: var(--bg); }
        
        .tag {
            font-size: 0.7rem;
            background: #334155;
            padding: 4px 8px;
            border-radius: 4px;
            margin: 5px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div src="Chinonso.jpg" alt="Chinonso Mitchel" class="profile-img"></div> 
    
    <h1>Mitchel C. Mbagha</h1>
    <p>MSc BIM Student & JavaScript Developer specializing in Vanilla JavaScript, Node.js, and 3D Model integration.</p>

    <div class="links-container">
        <a href="https://drive.google.com/file/d/1cCBWXtGbaSGiOGB6nA1cPbhqFutiA290/view?usp=drive_link" class="link-card primary fa-google-drive">  Download My CV (PDF)</a>
        
        <a href="https://github.com/ProgrammeMitch" class="link-card fa-github">  GitHub Portfolio</a>
        <a href="https://www.linkedin.com/in/dev-mitchel-mbagha/" class="link-card fa-linkedin"> LinkedIn Profile</a>
        
        <div style="text-align: center; margin-top: 2rem;">
            <h3>Top Skills</h3>
            <span class="tag">JavaScript (ES6+)</span>
            <span class="tag">ThreeJS</span>
            <span class="tag">Node.js</span>
            <span class="tag">REST APIs</span>
            <span class="tag">Git</span>
        </div>
    </div>

</body>
</html>
